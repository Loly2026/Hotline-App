services:
  - type: web
    name: hotline-backend
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 4001
      - key: DB_PATH
        value: /var/data/hotline.db
      - key: ADMIN_USER
        sync: false
      - key: ADMIN_PASS
        sync: false
      - key: FEEDBACK_TO_EMAIL
        sync: false
      - key: MAIL_FROM
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_SECURE
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
    disk:
      name: hotline-data
      mountPath: /var/data
      sizeGB: 1
